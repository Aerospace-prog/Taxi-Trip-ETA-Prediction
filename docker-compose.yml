# Taxi Trip Duration Predictor – Docker Compose (Full Stack)

services:
  # PostgreSQL Database
  db:
    image: postgres:14
    container_name: taxi_db
    environment:
      POSTGRES_USER: taxi
      POSTGRES_PASSWORD: securepass
      POSTGRES_DB: taxi_eta
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxi -d taxi_eta"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FastAPI Backend
  backend:
    build: ./backend
    container_name: taxi_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - model_data:/app/models
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # React Frontend (Nginx-served SPA)
  frontend:
    build: ./frontend
    container_name: taxi_frontend
    depends_on:
      - backend
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:stable-alpine
    container_name: taxi_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  model_data:
