# Nginx Reverse Proxy Configuration
# Routes: / → frontend, /api/ → backend

upstream backend_api {
    server backend:8000;
}

upstream frontend_app {
    server frontend:80;
}

server {
    listen 80;
    server_name localhost;

    # Proxy API requests to the FastAPI backend (strip /api prefix)
    location /api/ {
        proxy_pass http://backend_api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase timeouts for long-running requests (e.g., retrain upload)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        client_max_body_size 200M;
    }

    # Proxy Swagger docs directly (no /api prefix)
    location /docs {
        proxy_pass http://backend_api/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend_api/openapi.json;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://backend_api/redoc;
        proxy_set_header Host $host;
    }

    # Everything else goes to the frontend
    location / {
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
