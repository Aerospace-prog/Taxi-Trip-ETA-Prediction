name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Configure Git
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          
          # Clone the HF Space (Docker template) into a temporary directory
          git clone https://Aerospace-prog:$HF_TOKEN@huggingface.co/spaces/Aerospace-prog/taxi-eta-prediction hf_space
          
          # Remove previous files in the Space (except .git)
          find hf_space -maxdepth 1 ! -name 'hf_space' ! -name '.git' -exec rm -rf {} +
          
          # Copy only the contents of backend/ into the root of the HF Space
          cp -r backend/* hf_space/
          rm -rf hf_space/data
          rm -rf hf_space/models/*
          
          # Commit and push to Hugging Face
          cd hf_space
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "Sync backend from GitHub commit: ${{ github.sha }}"
            git push origin main
          else
            echo "No changes to deploy."
          fi
