# Taxi Trip Duration Predictor – Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d --build

services:
  # PostgreSQL Database
  db:
    image: postgres:14
    container_name: taxi_db
    env_file:
      - ./backend/.env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxi -d taxi_eta"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    # No ports exposed — only accessible within Docker network

  # FastAPI Backend
  backend:
    build: ./backend
    container_name: taxi_backend
    env_file:
      - ./backend/.env.production
    volumes:
      - model_data:/app/models
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
  model_data:
