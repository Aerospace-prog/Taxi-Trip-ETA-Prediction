# Taxi Trip Duration Predictor – Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml up -d --build

services:
  # PostgreSQL Database
  db:
    image: postgres:14
    container_name: taxi_db
    env_file:
      - ./backend/.env.production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxi -d taxi_eta"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    # No ports exposed — only accessible within Docker network

  # FastAPI Backend
  backend:
    build: ./backend
    container_name: taxi_backend
    env_file:
      - ./backend/.env.production
    volumes:
      - model_data:/app/models
    depends_on:
      db:
        condition: service_healthy
    restart: always
    # No host volume mount — uses baked-in image code
    # No port 8000 exposed externally — only through Nginx

  # React Frontend (Nginx-served SPA)
  frontend:
    build: ./frontend
    container_name: taxi_frontend
    depends_on:
      - backend
    restart: always

  # Nginx Reverse Proxy (public-facing entrypoint)
  nginx:
    image: nginx:stable-alpine
    container_name: taxi_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always

volumes:
  postgres_data:
  model_data:
